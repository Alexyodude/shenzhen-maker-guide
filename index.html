<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>SZ // maker guide</title>
<style>
  :root {
    --bg: #07090d;
    --bg-2: #0c111a;
    --panel: #0f1622;
    --line: #1c2735;
    --line-2: #2a3a50;
    --txt: #d6e2ef;
    --muted: #7d8ea3;
    --accent: #34f5a0;
    --accent-dim: #1c8f63;
    --amber: #ffb454;
    --red: #ff5d6c;
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 72px; }
  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--txt);
    background:
      radial-gradient(circle at 1px 1px, rgba(52,245,160,.10) 1px, transparent 0) 0 0 / 26px 26px,
      linear-gradient(180deg, var(--bg-2), var(--bg) 60%);
    background-attachment: fixed;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ---------- LOGIN GATE ---------- */
  #gate {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 1px 1px, rgba(52,245,160,.07) 1px, transparent 0) 0 0 / 26px 26px,
      var(--bg);
    padding: 20px;
  }
  .gate-box {
    width: 100%; max-width: 440px;
    background: var(--panel);
    border: 1px solid var(--line-2);
    border-radius: 10px;
    box-shadow: 0 0 0 1px rgba(52,245,160,.06), 0 30px 80px rgba(0,0,0,.6);
    overflow: hidden;
    font-family: var(--mono);
  }
  .gate-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    font-size: 12px; color: var(--muted);
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  .dot.r { background: #ff5f56; } .dot.y { background: #ffbd2e; } .dot.g { background: #27c93f; }
  .gate-bar span { margin-left: auto; letter-spacing: .5px; }
  .gate-body { padding: 28px 24px 26px; }
  .gate-body h1 {
    margin: 0 0 4px; font-size: 18px; letter-spacing: .5px; color: var(--accent);
  }
  .gate-body .sub { margin: 0 0 22px; font-size: 12.5px; color: var(--muted); }
  .gate-body .sub .blink { animation: blink 1.1s steps(1) infinite; color: var(--accent); }
  @keyframes blink { 50% { opacity: 0; } }
  .field { display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--line-2); border-radius: 7px;
    padding: 0 12px; transition: border-color .15s, box-shadow .15s; }
  .field:focus-within { border-color: var(--accent-dim); box-shadow: 0 0 0 3px rgba(52,245,160,.12); }
  .field .prompt { color: var(--accent); font-size: 14px; }
  .field input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--txt); font-family: var(--mono); font-size: 15px; padding: 13px 0;
    letter-spacing: 2px;
  }
  .gate-btn {
    width: 100%; margin-top: 14px; padding: 12px;
    background: var(--accent); color: #04130c; border: none; border-radius: 7px;
    font-family: var(--mono); font-weight: 700; font-size: 14px; letter-spacing: 1px;
    cursor: pointer; transition: filter .15s, transform .05s;
  }
  .gate-btn:hover { filter: brightness(1.08); }
  .gate-btn:active { transform: translateY(1px); }
  .gate-err { margin-top: 14px; min-height: 16px; font-size: 12.5px; color: var(--red); }
  .shake { animation: shake .35s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }

  /* ---------- NAV ---------- */
  header.nav {
    position: sticky; top: 0; z-index: 40;
    display: flex; align-items: center; gap: 18px;
    padding: 14px 22px;
    background: rgba(7,9,13,.82); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .brand { font-family: var(--mono); font-weight: 700; letter-spacing: 1px; color: var(--txt); }
  .brand b { color: var(--accent); }
  header.nav nav { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
  header.nav nav a {
    font-family: var(--mono); font-size: 13px; color: var(--muted);
    padding: 7px 12px; border-radius: 6px; border: 1px solid transparent;
  }
  header.nav nav a:hover { color: var(--accent); border-color: var(--line-2); text-decoration: none; }

  /* ---------- LAYOUT ---------- */
  main { max-width: 1040px; margin: 0 auto; padding: 0 22px 90px; }
  .hero { padding: 64px 0 36px; border-bottom: 1px solid var(--line); margin-bottom: 8px; }
  .hero .tag { font-family: var(--mono); font-size: 12.5px; color: var(--accent); letter-spacing: 2px; }
  .hero h1 { font-size: clamp(30px, 5vw, 46px); margin: 12px 0 10px; line-height: 1.1; letter-spacing: -.5px; }
  .hero p { color: var(--muted); max-width: 680px; font-size: 15.5px; }
  .hero .note { margin-top: 18px; font-family: var(--mono); font-size: 12px; color: var(--muted);
    border-left: 2px solid var(--line-2); padding-left: 12px; }

  section { padding: 48px 0 8px; scroll-margin-top: 72px; }
  .sec-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .sec-head .idx { font-family: var(--mono); color: var(--accent-dim); font-size: 14px; }
  .sec-head h2 { font-size: 26px; margin: 0; letter-spacing: -.3px; }
  .sec-sub { color: var(--muted); font-size: 14px; margin: 0 0 26px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 18px; }
  .card {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid var(--line); border-radius: 11px; padding: 20px;
    transition: border-color .18s, transform .18s, box-shadow .18s;
    position: relative;
  }
  .card:hover { border-color: var(--accent-dim); transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,.35), 0 0 0 1px rgba(52,245,160,.08); }
  .card h3 { margin: 0 0 2px; font-size: 17px; }
  .card h3 .zh { color: var(--muted); font-weight: 400; font-size: 14px; font-family: var(--mono); }
  .card .area { font-family: var(--mono); font-size: 11.5px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .badge { font-family: var(--mono); font-size: 11px; padding: 3px 9px; border-radius: 20px;
    border: 1px solid var(--line-2); color: var(--muted); }
  .badge.free { color: var(--accent); border-color: var(--accent-dim); }
  .badge.paid { color: var(--amber); border-color: #6b4a18; }
  .badge.mixed { color: #7cc7ff; border-color: #2a4a6b; }
  .badge.unknown { color: #b39ddb; border-color: #4a3a6b; }
  .badge.closed { color: var(--red); border-color: #6b2530; }
  .src { font-family: var(--mono); font-size: 10.5px; color: var(--accent-dim); margin-top: 10px; }
  .kv { font-size: 13.5px; margin: 9px 0; }
  .kv .k { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent-dim); display: block; margin-bottom: 2px; }
  .kv .v { color: var(--txt); }
  .kv .v.muted { color: var(--muted); }
  .card .lnk { margin-top: 14px; font-family: var(--mono); font-size: 12.5px; }
  ul.pack { list-style: none; margin: 4px 0 0; padding: 0; }
  ul.pack li { position: relative; padding: 5px 0 5px 22px; font-size: 13.5px;
    border-bottom: 1px solid rgba(28,39,53,.6); }
  ul.pack li:last-child { border-bottom: none; }
  ul.pack li::before { content: "▢"; position: absolute; left: 0; color: var(--accent-dim); font-size: 12px; top: 6px; }
  .card.wide { grid-column: 1 / -1; }
  ul.timeline { list-style: none; margin: 8px 0 0; padding: 2px 0 0 20px; border-left: 2px solid var(--line-2); }
  ul.timeline li { position: relative; padding: 0 0 18px 8px; }
  ul.timeline li:last-child { padding-bottom: 0; }
  ul.timeline li::before { content: ""; position: absolute; left: -27px; top: 2px; width: 11px; height: 11px;
    border-radius: 50%; background: var(--bg-2); border: 2px solid var(--accent); }
  ul.timeline .when { display: block; font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 3px; }
  ul.timeline .what { font-size: 13.5px; color: var(--muted); }
  ul.timeline .what b { color: var(--txt); }
  .disclaimer { font-family: var(--mono); font-size: 11.5px; color: var(--muted);
    background: var(--bg-2); border: 1px dashed var(--line-2); border-radius: 9px;
    padding: 14px 16px; margin: 6px 0 0; }
  footer { max-width: 1040px; margin: 40px auto 0; padding: 26px 22px; border-top: 1px solid var(--line);
    font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .hidden { display: none !important; }
</style>
</head>

const PBKDF2_ITER = 250000;

const b64ToBytes = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

async function deriveKey(password, salt) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: PBKDF2_ITER, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
}

async function tryDecrypt(password) {
  const salt = b64ToBytes(PAYLOAD.salt);
  const iv   = b64ToBytes(PAYLOAD.iv);
  const ct   = b64ToBytes(PAYLOAD.ct);
  const key  = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plain);
}

function reveal(html) {
  document.getElementById("content").innerHTML = html;
  document.getElementById("gate").classList.add("hidden");
  document.getElementById("site").classList.remove("hidden");
}

async function attempt(password) {
  try {
    const html = await tryDecrypt(password);
    // Cache the DECRYPTED content (never the passphrase) so an in-session reload
    // doesn't re-prompt. The plaintext is what the user already sees, so this
    // stores no extra secret — and the gate key never touches storage.
    try { sessionStorage.setItem("sz_html", html); } catch (_) {}
    reveal(html);
    return true;
  } catch (e) {
    const err = document.getElementById("err");
    err.textContent = "ACCESS DENIED — wrong passphrase";
    const box = document.querySelector(".gate-box");
    box.classList.remove("shake"); void box.offsetWidth; box.classList.add("shake");
    const pw = document.getElementById("pw"); pw.value = ""; pw.focus();
    return false;
  }
}

document.getElementById("gate-form").addEventListener("submit", (e) => {
  e.preventDefault();
  attempt(document.getElementById("pw").value);
});

// re-reveal within the same browser session without re-entering the passphrase
(() => {
  const cached = sessionStorage.getItem("sz_html");
  if (cached) reveal(cached);
})();
</script>
